name: Claude Issue Analyzer

on:
  issues:
    types: [opened, edited]

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Analyze and label issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools Bash(gh issue view *),Bash(gh issue edit *),Bash(gh issue comment *),Bash(gh label create *),Bash(gh label list *),Read'
          prompt: |
            You are analyzing a GitHub issue for a Tetris game project. The project has three files:
            - game.js (~305 lines): all game logic in vanilla JS, 'use strict', no modules
            - index.html: two <canvas> elements (#board 300×600px, #next-canvas 120×120px), side panel, and #overlay for PAUSE/GAME OVER
            - style.css: dark retro-arcade theme

            Key functions in game.js: init(), loop(ts), collide(), tryRotate(), rotateCW(), lockPiece(), ghostY(), draw(), drawNext()
            Speed formula: dropInterval = Math.max(100, 1000 − (level − 1) × 90) ms. Level up every 10 lines.
            Scoring: LINE_SCORES = [0, 100, 300, 500, 800] × level. Soft drop +1pt/row, hard drop +2pts/cell.

            Follow these steps exactly:

            ## Step 1: Read the issue
            Run: gh issue view ${{ github.event.issue.number }} --json number,title,body,labels

            ## Step 2: Read the codebase
            Read the files game.js and index.html to understand relevant code sections.

            ## Step 3: Determine and apply labels
            Choose from these labels (create any that don't exist yet):
            - bug (#d73a4a) — something isn't working correctly
            - enhancement (#a2eeef) — new feature or improvement
            - question (#d876e3) — needs more information
            - documentation (#0075ca) — docs improvements
            - game-logic (#e4e669) — game mechanics: collision, rotation, spawning, line clearing
            - ui (#f9d0c4) — visual presentation, canvas rendering, styles
            - scoring (#bfd4f2) — scoring system, levels, speed
            - performance (#fbca04) — speed, animation loop optimization
            - good-first-issue (#7057ff) — suitable for newcomers

            First list existing labels: gh label list
            Create any missing labels you need: gh label create "name" --color "#hexcolor" --description "description"
            Then apply the relevant labels: gh issue edit ${{ github.event.issue.number }} --add-label "label1,label2"

            ## Step 4: Post diagnostic comment
            Post a comment with this exact structure using:
            gh issue comment ${{ github.event.issue.number }} --body "BODY"

            The comment body must be in Markdown and include these sections:

            ## 🔍 Diagnóstico del Issue

            **Resumen:** [1-2 sentences describing what the issue is about]

            **Categoría:** [Bug / Mejora / Pregunta / Documentación]

            **Componente afectado:** [Which part: game-logic / ui / scoring / performance / other]

            ---

            ### Análisis técnico

            [Technical analysis referencing specific functions and code in game.js or index.html. Be specific about what code is involved.]

            ### Enfoque sugerido

            [High-level approach to implement the fix or feature. Reference relevant functions by name.]

            ### Código relevante

            [List the specific functions and approximate line areas in game.js or index.html that are relevant to this issue. Format as a bullet list.]

            ---
            *Análisis generado automáticamente por Claude Code*
